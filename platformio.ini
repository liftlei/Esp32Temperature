[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; ── Build flags ────────────────────────────────────────────────────────────
; LV_CONF_INCLUDE_SIMPLE   tells LVGL to find lv_conf.h via the normal
;                          include path (include/ is on the path by default
;                          in PlatformIO) rather than trying the relative
;                          "../../lv_conf.h" path inside the library tree.
;
; BOARD_HAS_PSRAM          enables PSRAM allocation for the LVGL draw buffers
;                          in display.cpp.  Remove if your board has no PSRAM.
;
; CONFIG_SPIRAM_*          required ESP-IDF PSRAM configuration flags.
build_flags =
  -DLV_CONF_INCLUDE_SIMPLE
  -DBOARD_HAS_PSRAM
  -DCONFIG_SPIRAM_SUPPORT=1
  -DCONFIG_SPIRAM_USE_MALLOC=1

[env:your_board]
lib_deps =
  lvgl/LittleVGL@^8.0.0
  espressif/esp-lcd
  adafruit/Adafruit-GT911-Library